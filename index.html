<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D-Chroma | Fiber Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #020617; color: #f8fafc; overflow: hidden; font-family: 'Inter', sans-serif; }
    canvas { cursor: grab; touch-action: none; }
    canvas:active { cursor: grabbing; }
    .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .btn-ui { transition: all 0.2s; background: #1e293b; border: 1px solid #334155; }
    .btn-ui.active { background: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
  </style>
</head>
<body class="h-screen flex flex-col items-center justify-center">

  <div class="absolute top-6 left-6 z-10 glass p-5 rounded-2xl pointer-events-none">
    <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">3D Chromatin Fiber</h1>
    <div class="mt-4 flex gap-6 text-[10px] uppercase tracking-widest font-bold text-slate-500">
      <div>Bins: <span id="stat-nodes" class="text-cyan-400">0</span></div>
      <div>TADs: <span id="stat-tads" class="text-purple-400">0</span></div>
      <div>Loops: <span id="stat-loops" class="text-rose-400">0</span></div>
    </div>
  </div>

  <div id="wrapper" class="relative w-[98vw] h-[85vh] rounded-3xl overflow-hidden shadow-2xl bg-[#010409]">
    <canvas id="viewer3d"></canvas>
    
    <div id="loading" class="absolute inset-0 flex items-center justify-center bg-slate-950 z-20">
      <div class="text-center">
        <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-xs tracking-widest text-slate-400">COMPUTING SPLINES...</p>
      </div>
    </div>
  </div>

  <div class="flex gap-3 mt-6 z-10">
    <button id="btn-rot" class="btn-ui active px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-tighter">Auto-Orbit</button>
    <button id="btn-beads" class="btn-ui active px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-tighter">Nucleosomes</button>
    <button id="btn-loops" class="btn-ui active px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-tighter">EPI Loops</button>
    <button id="btn-reset" class="btn-ui px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-tighter">Reset</button>
  </div>

  <script>
    class ChromaFiberEngine {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.data = null;
        this.camera = { rotX: 0.4, rotY: 0, zoom: 1.2, tRotX: 0.4, tRotY: 0, offX: 0, offY: 0 };
        this.settings = { autoRot: true, showLoops: true, showBeads: true, showComp: true };
        this.cache = { spline: [], loops: [], beads: [], tadColors: [] };
        
        this.initListeners();
        this.resize();
      }

      resize() {
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = this.canvas.parentElement.clientWidth * dpr;
        this.canvas.height = this.canvas.parentElement.clientHeight * dpr;
        this.ctx.scale(dpr, dpr);
      }

      // Catmull-Rom Spline Math
      solveSpline(t, p0, p1, p2, p3) {
        return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t * t + (-p0 + 3 * p1 - 3 * p2 + p3) * t * t * t);
      }

      preprocess(data) {
        this.data = data;
        const { x, y, z, loops, tad_boundaries } = data;
        const n = x.length;

        // 1. Centering
        const avg = { x: x.reduce((a,b)=>a+b,0)/n, y: y.reduce((a,b)=>a+b,0)/n, z: z.reduce((a,b)=>a+b,0)/n };
        const pts = x.map((_, i) => ({ x: x[i]-avg.x, y: y[i]-avg.y, z: z[i]-avg.z }));

        // 2. TAD Coloring
        this.cache.tadColors = pts.map((_, i) => {
          if (!tad_boundaries) return '#3b82f6';
          const tadIdx = tad_boundaries.findIndex(b => b > i);
          return `hsl(${(tadIdx * 137) % 360}, 70%, 60%)`;
        });

        // 3. Cached Spline (Interpolate 6 steps per bin)
        this.cache.spline = [];
        const steps = 6;
        for (let i = 0; i < n - 1; i++) {
          const get = (idx) => pts[Math.max(0, Math.min(n - 1, idx))];
          const p0 = get(i-1), p1 = get(i), p2 = get(i+1), p3 = get(i+2);
          
          for (let j = 0; j < steps; j++) {
            const t = j / steps;
            this.cache.spline.push({
              x: this.solveSpline(t, p0.x, p1.x, p2.x, p3.x),
              y: this.solveSpline(t, p0.y, p1.y, p2.y, p3.y),
              z: this.solveSpline(t, p0.z, p1.z, p2.z, p3.z),
              color: this.cache.tadColors[i]
            });
          }
        }

        // 4. Nucleosome Beads
        this.cache.beads = pts.map((p, i) => ({ ...p, color: this.cache.tadColors[i] }));

        // 5. Arcs
        this.cache.loops = (loops || []).map(lp => {
          const pA = pts[lp.a], pB = pts[lp.b];
          const dist = Math.hypot(pA.x-pB.x, pA.y-pB.y, pA.z-pB.z);
          const mid = { x:(pA.x+pB.x)/2, y:(pA.y+pB.y)/2 - dist*0.6, z:(pA.z+pB.z)/2 };
          return { pA, pB, mid, color: lp.color || '#f43f5e' };
        });

        document.getElementById('stat-nodes').textContent = n;
        document.getElementById('stat-tads').textContent = tad_boundaries?.length || 0;
        document.getElementById('stat-loops').textContent = loops?.length || 0;
        document.getElementById('loading').style.display = 'none';
      }

      project(p) {
        const cx = Math.cos(this.camera.rotX), sx = Math.sin(this.camera.rotX);
        const cy = Math.cos(this.camera.rotY), sy = Math.sin(this.camera.rotY);
        let x = p.x * cy + p.z * sy;
        let z = -p.x * sy + p.z * cy;
        let y = p.y * cx - z * sx;
        z = p.y * sx + z * cx;
        const f = 600 / (600 + z + 100);
        return {
          x: (x * f * this.camera.zoom) + (this.canvas.width/2/window.devicePixelRatio) + this.camera.offX,
          y: (y * f * this.camera.zoom) + (this.canvas.height/2/window.devicePixelRatio) + this.camera.offY,
          z: z, f: f
        };
      }

      draw() {
        if (!this.data) return;
        const ctx = this.ctx;
        const W = this.canvas.width / window.devicePixelRatio;
        const H = this.canvas.height / window.devicePixelRatio;

        ctx.fillStyle = '#010409';
        ctx.fillRect(0, 0, W, H);

        if (this.settings.autoRot) this.camera.tRotY += 0.003;
        this.camera.rotX += (this.camera.tRotX - this.camera.rotX) * 0.1;
        this.camera.rotY += (this.camera.tRotY - this.camera.rotY) * 0.1;

        const renderList = [];

        // Add Spline Segments
        for (let i = 0; i < this.cache.spline.length - 1; i++) {
          const p1 = this.project(this.cache.spline[i]);
          const p2 = this.project(this.cache.spline[i+1]);
          renderList.push({
            z: (p1.z + p2.z)/2,
            render: () => this.drawTube(p1, p2, this.cache.spline[i].color)
          });
        }

        // Add Beads
        if (this.settings.showBeads) {
          this.cache.beads.forEach(b => {
            const p = this.project(b);
            renderList.push({ z: p.z, render: () => this.drawBead(p, b.color) });
          });
        }

        // Add Loops
        if (this.settings.showLoops) {
          this.cache.loops.forEach(lp => {
            const a = this.project(lp.pA), b = this.project(lp.pB), c = this.project(lp.mid);
            renderList.push({ z: (a.z+b.z+c.z)/3, render: () => this.drawLoop(a, b, c, lp.color) });
          });
        }

        renderList.sort((a,b) => b.z - a.z);
        renderList.forEach(item => item.render());

        requestAnimationFrame(() => this.draw());
      }

      drawTube(p1, p2, color) {
        const ctx = this.ctx;
        const fog = Math.max(0.1, (p1.z + 200) / 400); // Depth Fog
        const w = 4 * p1.f;

        // Pass 1: Outer Glow
        ctx.beginPath();
        ctx.lineWidth = w * 2.5;
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.15 * fog;
        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.stroke();

        // Pass 2: Main Body
        ctx.globalAlpha = 1.0 * fog;
        ctx.lineWidth = w;
        ctx.stroke();

        // Pass 3: Specular Highlight (Simulate 3D fiber)
        ctx.beginPath();
        ctx.lineWidth = w * 0.3;
        ctx.strokeStyle = '#ffffff';
        ctx.globalAlpha = 0.4 * fog;
        ctx.moveTo(p1.x - w*0.2, p1.y - w*0.2); 
        ctx.lineTo(p2.x - w*0.2, p2.y - w*0.2);
        ctx.stroke();
        ctx.globalAlpha = 1.0;
      }

      drawBead(p, color) {
        const r = 5 * p.f;
        const grad = this.ctx.createRadialGradient(p.x - r*0.3, p.y - r*0.3, r*0.1, p.x, p.y, r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.2, color);
        grad.addColorStop(1, '#000000');
        this.ctx.fillStyle = grad;
        this.ctx.beginPath();
        this.ctx.arc(p.x, p.y, r, 0, Math.PI*2);
        this.ctx.fill();
      }

      drawLoop(a, b, c, color) {
        const ctx = this.ctx;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.quadraticCurveTo(c.x, c.y, b.x, b.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2 * a.f;
        ctx.globalAlpha = 0.4;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1.0;
      }

      initListeners() {
        window.addEventListener('resize', () => this.resize());
        this.canvas.addEventListener('mousedown', e => { this.drag = true; this.lastM = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mousemove', e => {
          if (!this.drag) return;
          const dx = e.clientX - this.lastM.x;
          const dy = e.clientY - this.lastM.y;
          this.camera.tRotY += dx * 0.01;
          this.camera.tRotX += dy * 0.01;
          this.lastM = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('mouseup', () => this.drag = false);
        this.canvas.addEventListener('wheel', e => { e.preventDefault(); this.camera.zoom *= (e.deltaY < 0 ? 1.1 : 0.9); }, { passive: false });
      }
    }

    const engine = new ChromaFiberEngine('viewer3d');

    const bind = (id, fn) => {
      const el = document.getElementById(id);
      el.onclick = () => { const s = fn(); el.classList.toggle('active', s); };
    }

    bind('btn-rot', () => engine.settings.autoRot = !engine.settings.autoRot);
    bind('btn-beads', () => engine.settings.showBeads = !engine.settings.showBeads);
    bind('btn-loops', () => engine.settings.showLoops = !engine.settings.showLoops);
    document.getElementById('btn-reset').onclick = () => { engine.camera.tRotX = 0.4; engine.camera.tRotY = 0; engine.camera.zoom = 1.2; };

    fetch('https://raw.githubusercontent.com/Nikhil8557/3D-Chroma/main/chromatin_data.json')
      .then(r => r.json())
      .then(data => { engine.preprocess(data); engine.draw(); });
  </script>
</body>
</html>
