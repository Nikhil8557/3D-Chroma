<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D-Chroma | Advanced Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #020617; }
    body { background-color: var(--bg); color: #f8fafc; overflow: hidden; }
    canvas { cursor: grab; touch-action: none; }
    canvas:active { cursor: grabbing; }
    .glass {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-toggle {
      transition: all 0.2s;
      background: #1e293b;
      border: 1px solid #334155;
    }
    .btn-toggle.active {
      background: #3b82f6;
      border-color: #60a5fa;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }
  </style>
</head>
<body class="h-screen flex flex-col items-center justify-center">

  <!-- Header Info -->
  <div class="absolute top-6 left-6 z-10 glass p-4 rounded-xl pointer-events-none">
    <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
      3D Chromatin Engine
    </h1>
    <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest" id="data-status">Initializing...</p>
    <div class="mt-3 flex gap-4 text-xs font-mono">
      <div>Nodes: <span id="stat-nodes" class="text-blue-400">0</span></div>
      <div>Loops: <span id="stat-loops" class="text-red-400">0</span></div>
    </div>
  </div>

  <!-- Main Canvas Container -->
  <div id="wrapper" class="relative w-[95vw] h-[80vh] max-w-5xl rounded-2xl overflow-hidden shadow-2xl border border-white/5 bg-black">
    <canvas id="viewer3d" class="w-full h-full"></canvas>
    
    <!-- Interaction Help -->
    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-[10px] text-white/30 uppercase tracking-[0.2em] pointer-events-none">
      Orbit: Drag · Zoom: Scroll · Pan: Shift+Drag
    </div>
  </div>

  <!-- Controls -->
  <div class="flex gap-3 mt-6 z-10">
    <button id="btn-rot" class="btn-toggle active px-4 py-2 rounded-lg text-sm font-medium">Auto-Orbit</button>
    <button id="btn-loops" class="btn-toggle active px-4 py-2 rounded-lg text-sm font-medium">Loops</button>
    <button id="btn-comp" class="btn-toggle active px-4 py-2 rounded-lg text-sm font-medium">Compartments</button>
    <button id="btn-reset" class="btn-toggle px-4 py-2 rounded-lg text-sm font-medium">Reset View</button>
  </div>

  <script>
    /**
     * CHROMA 3D ENGINE
     * Optimized for Hi-C spatial data visualization
     */
    class ChromaViewer {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.data = null;
        
        // Camera State
        this.camera = {
          rotX: 0.3, rotY: 0, zoom: 1,
          targetRotX: 0.3, targetRotY: 0,
          offX: 0, offY: 0,
          inertia: 0.08
        };

        // Animation State
        this.state = {
          autoRot: true,
          showLoops: true,
          showComp: true,
          time: 0,
          drag: false,
          lastM: { x: 0, y: 0 }
        };

        this.cache = { backbone: [], loops: [] };
        this.initListeners();
        this.resize();
      }

      resize() {
        const dpr = window.devicePixelRatio || 1;
        const rect = this.canvas.parentElement.getBoundingClientRect();
        this.canvas.width = rect.width * dpr;
        this.canvas.height = rect.height * dpr;
        this.ctx.scale(dpr, dpr);
      }

      load(data) {
        this.data = data;
        this.preprocess();
        document.getElementById('data-status').textContent = "Structure Loaded";
        document.getElementById('stat-nodes').textContent = data.x.length;
        document.getElementById('stat-loops').textContent = data.loops?.length || 0;
      }

      preprocess() {
        const { x, y, z, loops } = this.data;
        const n = x.length;
        
        // 1. Centering
        const mid = { 
          x: x.reduce((a,b)=>a+b,0)/n, 
          y: y.reduce((a,b)=>a+b,0)/n, 
          z: z.reduce((a,b)=>a+b,0)/n 
        };

        // 2. Backbone with biological smoothing
        this.cache.backbone = [];
        for(let i=0; i<n; i++) {
          this.cache.backbone.push({
            x: x[i] - mid.x, y: y[i] - mid.y, z: z[i] - mid.z,
            bin: i, ev: this.data.ev?.[i] || 0
          });
        }

        // 3. Pre-calculate loop arcs
        this.cache.loops = (loops || []).map(lp => {
          const pA = this.cache.backbone[lp.a];
          const pB = this.cache.backbone[lp.b];
          const dist = Math.hypot(pA.x-pB.x, pA.y-pB.y, pA.z-pB.z);
          
          // Generate arc points
          const arc = [];
          const segments = 12;
          for(let i=0; i<=segments; i++) {
            const t = i/segments;
            const mt = 1-t;
            // Quadratic bezier bulge
            const h = dist * 0.5;
            arc.push({
              x: mt*pA.x + t*pB.x,
              y: mt*pA.y + t*pB.y - (Math.sin(t*Math.PI) * h), // Lift arc upwards
              z: mt*pA.z + t*pB.z,
            });
          }
          return { arc, color: lp.color || '#ef4444', score: lp.score || 0.5 };
        });
      }

      project(p) {
        // Rotate
        const cx = Math.cos(this.camera.rotX), sx = Math.sin(this.camera.rotX);
        const cy = Math.cos(this.camera.rotY), sy = Math.sin(this.camera.rotY);
        
        let x = p.x * cy + p.z * sy;
        let z = -p.x * sy + p.z * cy;
        let y = p.y * cx - z * sx;
        z = p.y * sx + z * cx;

        const depth = 1 / (1 + (z + 50) / 500); // Simple perspective
        return {
          x: (x * depth * this.camera.zoom * 20) + (this.canvas.width / (2 * window.devicePixelRatio)) + this.camera.offX,
          y: (y * depth * this.camera.zoom * 20) + (this.canvas.height / (2 * window.devicePixelRatio)) + this.camera.offY,
          z: z,
          depth: depth
        };
      }

      draw() {
        if (!this.data) return;
        const ctx = this.ctx;
        const W = this.canvas.width / window.devicePixelRatio;
        const H = this.canvas.height / window.devicePixelRatio;

        // Clean slate
        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, W, H);

        // Smooth Camera
        if (this.state.autoRot && !this.state.drag) this.camera.targetRotY += 0.005;
        this.camera.rotX += (this.camera.targetRotX - this.camera.rotX) * this.camera.inertia;
        this.camera.rotY += (this.camera.targetRotY - this.camera.rotY) * this.camera.inertia;

        const renderList = [];

        // Add backbone segments to render list
        for (let i = 0; i < this.cache.backbone.length - 1; i++) {
          const p1 = this.project(this.cache.backbone[i]);
          const p2 = this.project(this.cache.backbone[i+1]);
          const isA = this.cache.backbone[i].ev > 0;
          
          renderList.push({
            type: 'path',
            z: (p1.z + p2.z) / 2,
            draw: () => {
              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = this.state.showComp 
                ? (isA ? `rgba(96, 165, 250, ${0.2 + p1.depth})` : `rgba(248, 113, 113, ${0.2 + p1.depth})`)
                : `rgba(148, 163, 184, ${0.1 + p1.depth})`;
              ctx.lineWidth = 2 * p1.depth;
              ctx.stroke();
            }
          });
        }

        // Add loops
        if (this.state.showLoops) {
          this.cache.loops.forEach(loop => {
            const pts = loop.arc.map(p => this.project(p));
            renderList.push({
              type: 'loop',
              z: pts.reduce((a,b) => a + b.z, 0) / pts.length,
              draw: () => {
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                ctx.strokeStyle = loop.color;
                ctx.globalAlpha = 0.3 * pts[0].depth;
                ctx.lineWidth = 1.5 * pts[0].depth;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
              }
            });
          });
        }

        // Sort by Z (Depth Buffer)
        renderList.sort((a, b) => b.z - a.z);
        renderList.forEach(item => item.draw());

        this.state.time += 0.01;
        requestAnimationFrame(() => this.draw());
      }

      initListeners() {
        window.addEventListener('resize', () => this.resize());

        this.canvas.addEventListener('mousedown', e => {
          this.state.drag = true;
          this.state.lastM = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', e => {
          if (!this.state.drag) return;
          const dx = e.clientX - this.state.lastM.x;
          const dy = e.clientY - this.state.lastM.y;
          
          if (e.shiftKey) {
            this.camera.offX += dx;
            this.camera.offY += dy;
          } else {
            this.camera.targetRotY += dx * 0.01;
            this.camera.targetRotX += dy * 0.01;
          }
          this.state.lastM = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => this.state.drag = false);

        this.canvas.addEventListener('wheel', e => {
          e.preventDefault();
          this.camera.zoom *= (e.deltaY < 0 ? 1.1 : 0.9);
        }, { passive: false });
      }
    }

    // Initialize
    const viewer = new ChromaViewer('viewer3d');

    // Controls Logic
    const toggleBtn = (id, callback) => {
      const btn = document.getElementById(id);
      btn.onclick = () => {
        const state = callback();
        btn.classList.toggle('active', state);
      };
    };

    toggleBtn('btn-rot', () => viewer.state.autoRot = !viewer.state.autoRot);
    toggleBtn('btn-loops', () => viewer.state.showLoops = !viewer.state.showLoops);
    toggleBtn('btn-comp', () => viewer.state.showComp = !viewer.state.showComp);
    document.getElementById('btn-reset').onclick = () => {
      viewer.camera.targetRotX = 0.3;
      viewer.camera.targetRotY = 0;
      viewer.camera.zoom = 1;
      viewer.camera.offX = 0;
      viewer.camera.offY = 0;
    };

    // Load Data
    fetch('https://raw.githubusercontent.com/Nikhil8557/3D-Chroma/main/chromatin_data.json')
      .then(r => r.json())
      .then(data => {
        viewer.load(data);
        viewer.draw();
      })
      .catch(err => {
        console.error("Data fail:", err);
        document.getElementById('data-status').textContent = "Error Loading Data";
      });
  </script>
</body>
</html>
